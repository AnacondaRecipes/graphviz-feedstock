{% set name = "graphviz" %}
{% set version = "14.1.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://gitlab.com/{{ name }}/{{ name }}/-/archive/{{ version }}/{{ name }}-{{ version }}.tar.gz
    sha256: b6afb085412a82b34508cfe067ae95f8e565739c5818d4814f5c5a6114f153f5
    patches:
      - patches/0001-Always-link-to-getopt-on-Windows.patch
      - patches/0002-Remove-requirement-of-hard-coded-DLLs-in-PATH.patch
      - patches/0003-Use-WebP-CMake-targets-instead-of-PkgConfig.patch
      - patches/0004-Fix-dependencies-for-gvplugin_gd.patch
      - patches/0005-Don-t-rely-on-pkgconfig-for-GTS-on-Windows.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('graphviz', max_pin='x') }}

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - make                                                # [unix]
    - bison                                               # [unix]
    - libtool                                             # [unix]
    - automake                                            # [unix]
    - autoconf                                            # [unix]
    - m4                                                  # [unix]
    - cmake                                               # [win]
    - ninja-base                                          # [win]
    - msys2-gawk                                          # [win]
    - msys2-flex                                          # [win]
    - msys2-bison                                         # [win]
    - perl                                                # [win]
    - python >=3
  host:
    - cairo {{ cairo }}
    - pango {{ pango }}
    - expat {{ expat }}
    - libglib {{ libglib }}
    - gts {{ gts }}
    - gdk-pixbuf {{ gdk_pixbuf }}                         # [unix]
    - gtk3 {{ gtk3 }}                                     # [unix]
    - libgd {{ libgd }}
    - librsvg {{ librsvg }}                               # [unix]
    - libwebp-base {{ libwebp_base }}
    - zlib {{ zlib }}
    # Windows only deps
    - getopt-win32                                        # [win]
  run:
    - fonts-conda-ecosystem                               # [unix]
    - cairo
    - pango
    - libglib
    - gts
    - libgd
    - libwebp-base
    - librsvg       # [unix]

test:
  files:
    - sample.dot

  # downstreams:
  #   - pydot
  #   - pydotplus
  #   - pygraphviz
  #   - python-graphviz 0.16
  #   - python-graphviz 0.20.1

about:
  home: https://www.graphviz.org
  license: EPL-1.0
  license_family: Other
  license_file: COPYING
  summary: Open Source graph visualization software.
  description: |
    Graphviz is an open source graph visualization software. Graph visualization
    is a way of representing structural information as diagrams of abstract
    graphs and networks.
  doc_url: https://graphviz.gitlab.io/documentation
  dev_url: https://gitlab.com/graphviz/graphviz

extra:
  recipe-maintainers:
    - jakirkham
    - ccordoba12
    - ocefpaf
    - johanneskoester
    - nehaljwani
